services:
  db:
    image: postgres:16-alpine
    container_name: relayq-container
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./data/db:/var/lib/postgresql/data:Z

  redis:
    image: redis:7-alpine
    container_name: relayq-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data:Z